<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Report</title>

<style>
{{ .CSS }}
</style>
</head>

<body>

<div class="page">

	<header class="header">
		<h1 id="title"></h1>
		<div id="subtitle"></div>
	</header>

	<section id="summary" class="summary"></section>

	<section class="toolbar">
		<input id="search" class="search"
			placeholder="Search by IP, hostname, port, service, version">

		<div id="filters" class="filters"></div>
	</section>

	<section id="content"></section>

</div>

<script>

const report = {{ .JSONData }};

const FILTERS = [
	{ key: "all", label: "All" },
	{ key: "web", label: "Web" },
	{ key: "smtp", label: "SMTP" },
	{ key: "sql", label: "SQL" },
	{ key: "smb", label: "SMB" },
	{ key: "nfs", label: "NFS" },
	{ key: "ftp", label: "FTP" },
	{ key: "ssh", label: "SSH" },
	{ key: "file-storage", label: "File Storage" }
];

let activeFilter = "all";

function escapeHtml(s) {
	return String(s || "")
		.replaceAll("&","&amp;")
		.replaceAll("<","&lt;")
		.replaceAll(">","&gt;");
}

function hasTag(host, tag) {
	return host.tags && host.tags.includes(tag);
}

function matchFilter(host) {
	if (activeFilter === "all") return true;
	return hasTag(host, activeFilter);
}

function matchSearch(host, q) {
	if (!q) return true;
	return JSON.stringify(host).toLowerCase().includes(q);
}

function renderHeader() {
	document.getElementById("title").textContent =
		`Network: ${report.network_name}`;

	document.getElementById("subtitle").textContent =
		`CIDR: ${report.cidr} | Generated: ${report.generated_at}`;
}

function renderSummary() {
	document.getElementById("summary").innerHTML = `
		<div class="metric">Hosts: ${report.host_count}</div>
		<div class="metric">Open Ports: ${report.open_port_count}</div>
		<div class="metric">Scanner: ${report.scanner}</div>
	`;
}

function renderFilters() {
	const container = document.getElementById("filters");

	container.innerHTML = FILTERS.map(f => `
		<button class="${f.key === activeFilter ? 'active' : ''}"
			onclick="setFilter('${f.key}')">
			${f.label}
		</button>
	`).join("");
}

function setFilter(f) {
	activeFilter = f;
	render();
}

function render() {
	const q = document.getElementById("search").value.toLowerCase();

	let html = "";

	for (const h of report.hosts) {

		if (!matchFilter(h)) continue;
		if (!matchSearch(h, q)) continue;

		html += `
		<div class="host">

			<div class="host-header">
				<div>
					<strong>${escapeHtml(h.hostname || h.ip)}</strong>
					<span class="ip">${h.ip}</span>
				</div>
			</div>

			<div class="tags">
				${(h.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}
			</div>

			<table>
				<tr>
					<th>Port</th>
					<th>Service</th>
					<th>Product</th>
					<th>Version</th>
				</tr>
		`;

		for (const p of h.ports) {
			html += `
				<tr>
					<td>${p.port}</td>
					<td>${escapeHtml(p.service)}</td>
					<td>${escapeHtml(p.product)}</td>
					<td>${escapeHtml(p.version)}</td>
				</tr>
			`;
		}

		html += `</table>`;

		html += `<div class="details">`;

		html += `
			<h4>System</h4>
			<div>OS: ${(h.os && h.os.length) ? h.os.join(", ") : "unknown"}</div>
		`;

		if (h.smb) {
			html += `
			<h4>SMB</h4>
			<div><b>Shares:</b></div>
			<ul>
				${(h.smb.shares || []).map(x => `<li>${x}</li>`).join("")}
			</ul>

			<div><b>Users:</b></div>
			<ul>
				${(h.smb.users || []).map(x => `<li>${x}</li>`).join("")}
			</ul>

			<details>
				<summary>Raw SMB Output</summary>
				<pre>${escapeHtml(h.smb.raw)}</pre>
			</details>
			`;
		}

		if (h.nfs) {
			html += `
			<h4>NFS</h4>

			<div><b>Exports:</b></div>
			<ul>
				${(h.nfs.exports || []).map(x => `<li>${x}</li>`).join("")}
			</ul>

			<details>
				<summary>Raw NFS Output</summary>
				<pre>${escapeHtml(h.nfs.raw)}</pre>
			</details>
			`;
		}

		if (h.rpc) {
			html += `
			<h4>RPC (Port 111)</h4>

			<details>
				<summary>Show RPC Info</summary>
				<pre>${escapeHtml(h.rpc)}</pre>
			</details>
			`;
		}

		html += `</div></div>`;
	}

	document.getElementById("content").innerHTML = html;
}

document.getElementById("search").oninput = render;

renderHeader();
renderSummary();
renderFilters();
render();

</script>

</body>
</html>
