<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Network Scan Report</title>

<style>
{{ .CSS }}
</style>
</head>

<body>

<div class="container">
    <h1>Network Report</h1>

    <div class="controls">
        <input id="search" placeholder="Search by IP, hostname, port, service..." />

        <div class="filters">
            <button onclick="setFilter('all')">All</button>
            <button onclick="setFilter('web')">Web</button>
            <button onclick="setFilter('smtp')">SMTP</button>
            <button onclick="setFilter('sql')">SQL</button>
            <button onclick="setFilter('smb')">SMB</button>
            <button onclick="setFilter('ftp')">FTP</button>
        </div>
    </div>

    <div id="content"></div>
</div>

<script>
const report = {{ .JSONData }};
let currentFilter = "all";

function hasTag(host, tag) {
    if (!host.tags) return false;
    return host.tags.includes(tag);
}

function matchFilter(host) {
    if (currentFilter === "all") return true;
    return hasTag(host, currentFilter);
}

function matchSearch(host, query) {
    if (!query) return true;

    const str = JSON.stringify(host).toLowerCase();
    return str.includes(query);
}

function render() {
    const query = document.getElementById("search").value.toLowerCase();

    let html = "";

    for (const h of report.hosts) {

        if (!matchFilter(h)) continue;
        if (!matchSearch(h, query)) continue;

        html += `
        <div class="host">
            <div class="host-header">
                <div>
                    <strong>${h.hostname || "unknown"}</strong>
                    <span class="ip">${h.ip}</span>
                </div>
                <button onclick="toggle('${h.ip}')">Details</button>
            </div>

            <table>
                <tr>
                    <th>Port</th>
                    <th>Service</th>
                    <th>Product</th>
                    <th>Version</th>
                </tr>
        `;

        for (const p of h.ports) {
            html += `
                <tr>
                    <td>${p.port}</td>
                    <td>${p.service || ""}</td>
                    <td>${p.product || ""}</td>
                    <td>${p.version || ""}</td>
                </tr>
            `;
        }

        html += `</table>`;

        html += `<div class="details" id="d-${h.ip}" style="display:none;">`;

        if (h.smb) {
            html += `<h4>SMB</h4><pre>${h.smb}</pre>`;
        }

        if (h.nfs) {
            html += `<h4>NFS</h4><pre>${h.nfs}</pre>`;
        }

        html += `</div></div>`;
    }

    document.getElementById("content").innerHTML = html;
}

function toggle(id) {
    const el = document.getElementById("d-" + id);
    el.style.display = el.style.display === "none" ? "block" : "none";
}

function setFilter(f) {
    currentFilter = f;
    render();
}

document.getElementById("search").oninput = render;

render();
</script>

</body>
</html>
