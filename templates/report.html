<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Network Report</title>
	<style>{{ .CSS }}</style>
</head>
<body>
	<div class="page">
		<header class="header">
			<h1 class="title" id="title"></h1>
			<div class="subtitle" id="subtitle"></div>
		</header>

		<section class="summary" id="summary"></section>

		<section class="toolbar">
			<input id="search" class="search" type="text" placeholder="Р СҹР С•Р С‘РЎРғР С” Р С—Р С• IP, hostname, Р С—Р С•РЎРӮРЎвҖҡРЎС“, РЎРғР ВөРЎРӮР РҶР С‘РЎРғРЎС“, Р С—РЎРӮР С•Р Т‘РЎС“Р С”РЎвҖҡРЎС“, Р РҶР ВөРЎРӮРЎРғР С‘Р С‘">
		</section>

		<section id="content"></section>
	</div>

	<script>
		const report = {{ .JSONData }};

		const titleNode = document.getElementById("title");
		const subtitleNode = document.getElementById("subtitle");
		const summaryNode = document.getElementById("summary");
		const searchNode = document.getElementById("search");
		const contentNode = document.getElementById("content");

		function escapeHtml(value) {
			return String(value ?? "")
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;")
				.replaceAll("'", "&#039;");
		}

		function metric(value, label) {
			return `
				<div class="metric">
					<div class="metric-value">${escapeHtml(value)}</div>
					<div class="metric-label">${escapeHtml(label)}</div>
				</div>
			`;
		}

		function formatService(port) {
			const parts = [];
			if (port.tunnel) parts.push(port.tunnel);
			if (port.service) parts.push(port.service);
			if (port.product) parts.push(port.product);
			if (port.version) parts.push(port.version);
			if (port.extra_info) parts.push("(" + port.extra_info + ")");
			return parts.join(" ");
		}

		function hostSearchText(host) {
			const values = [
				host.ip,
				host.hostname,
				host.mac,
				host.mac_vendor,
				...(host.os || [])
			];

			for (const port of host.ports || []) {
				values.push(
					String(port.port),
					port.protocol,
					port.service,
					port.product,
					port.version,
					port.extra_info,
					port.tunnel
				);
			}

			return values.join(" ").toLowerCase();
		}

		function renderHeader() {
			titleNode.textContent = `Р СӣРЎвҖҡРЎвҖЎРЎвҖҳРЎвҖҡ Р С—Р С• РЎРғР ВөРЎвҖҡР С‘: ${report.network_name}`;
			subtitleNode.textContent =
				`CIDR: ${report.cidr} | Р ВҳРЎРғРЎвҖҡР С•РЎвҖЎР Р…Р С‘Р С” XML: ${report.source_xml} | Р РҺР С–Р ВөР Р…Р ВөРЎРӮР С‘РЎРӮР С•Р РҶР В°Р Р…Р С•: ${report.generated_at}`;
		}

		function renderSummary() {
			summaryNode.innerHTML = [
				metric(report.host_count, "Р ТҗР С•РЎРғРЎвҖҡР С•Р РҶ РЎРғ Р С•РЎвҖҡР С”РЎРӮРЎвҖ№РЎвҖҡРЎвҖ№Р СҳР С‘ Р С—Р С•РЎРӮРЎвҖҡР В°Р СҳР С‘"),
				metric(report.open_port_count, "Р СӣРЎвҖҡР С”РЎРӮРЎвҖ№РЎвҖҡРЎвҖ№РЎвҖҰ Р С—Р С•РЎРӮРЎвҖҡР С•Р РҶ"),
				metric(report.scanner || "-", "Р РҺР С”Р В°Р Р…Р ВөРЎРӮ"),
				metric(report.scanner_version || "-", "Р вҖҷР ВөРЎРӮРЎРғР С‘РЎРҸ")
			].join("");
		}

		function renderHosts(filterText = "") {
			const query = filterText.trim().toLowerCase();

			const hosts = (report.hosts || []).filter(host => {
				if (!query) return true;
				return hostSearchText(host).includes(query);
			});

			if (hosts.length === 0) {
				contentNode.innerHTML = `<section class="block"><div class="empty">Р СңР С‘РЎвҖЎР ВөР С–Р С• Р Р…Р Вө Р Р…Р В°Р в„–Р Т‘Р ВөР Р…Р С•.</div></section>`;
				return;
			}

			let html = "";

			for (const host of hosts) {
				const hostTitle = host.hostname && host.hostname.trim() !== ""
					? `${escapeHtml(host.hostname)} <span class="muted">(${escapeHtml(host.ip)})</span>`
					: escapeHtml(host.ip);

				const osText = host.os && host.os.length > 0
					? host.os.map(escapeHtml).join(", ")
					: "Р Р…Р Вө Р С•Р С—РЎРӮР ВөР Т‘Р ВөР В»Р ВөР Р…Р С•";

				const macText = host.mac
					? `${escapeHtml(host.mac)}${host.mac_vendor ? ` <span class="muted">(${escapeHtml(host.mac_vendor)})</span>` : ""}`
					: "РІРӮвҖқ";

				html += `
					<section class="block">
						<div class="block-header">
							<div>
								<h2>${hostTitle}</h2>
								<div class="block-note">MAC: ${macText}</div>
								<div class="block-note">OS: ${osText}</div>
								<div class="block-note">Р СӣРЎвҖҡР С”РЎРӮРЎвҖ№РЎвҖҡРЎвҖ№РЎвҖҰ Р С—Р С•РЎРӮРЎвҖҡР С•Р РҶ: ${escapeHtml(host.ports.length)}</div>
							</div>
						</div>

						<div class="table-wrap">
							<table>
								<thead>
									<tr>
										<th>Р СҹР С•РЎРӮРЎвҖҡ</th>
										<th>Р СҹРЎРӮР С•РЎвҖҡР С•Р С”Р С•Р В»</th>
										<th>Р РҺР ВөРЎРӮР РҶР С‘РЎРғ</th>
										<th>Р СҹРЎРӮР С•Р Т‘РЎС“Р С”РЎвҖҡ</th>
										<th>Р вҖҷР ВөРЎРӮРЎРғР С‘РЎРҸ</th>
										<th>Р СӣР С—Р С‘РЎРғР В°Р Р…Р С‘Р Вө</th>
									</tr>
								</thead>
								<tbody>
				`;

				for (const port of host.ports) {
					html += `
						<tr>
							<td>${escapeHtml(port.port)}</td>
							<td>${escapeHtml(port.protocol)}</td>
							<td>${escapeHtml(port.service || "-")}</td>
							<td>${escapeHtml(port.product || "-")}</td>
							<td>${escapeHtml(port.version || "-")}</td>
							<td>${escapeHtml(formatService(port) || "-")}</td>
						</tr>
					`;
				}

				html += `
								</tbody>
							</table>
						</div>
					</section>
				`;
			}

			contentNode.innerHTML = html;
		}

		searchNode.addEventListener("input", (event) => {
			renderHosts(event.target.value);
		});

		renderHeader();
		renderSummary();
		renderHosts();
	</script>
</body>
</html>
